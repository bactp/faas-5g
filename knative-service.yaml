apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cifar10-faas
  namespace: default
  labels:
    app: cifar10-faas
    network-slice: faas-dn          # label matching your 5G data network context
  annotations:
    serving.knative.dev/creator: faas-operator
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle — true serverless
        # Set to "1" for low-latency 5G testing (avoids cold start)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"

        # Trigger scale-up when avg concurrent requests per pod exceeds this
        autoscaling.knative.dev/target: "5"

        # Use Knative's default KPA (Kubernetes Pod Autoscaler)
        autoscaling.knative.dev/class: "kpa.autoscaling.knative.dev"
    spec:
      # How many concurrent requests a single pod handles before another is spawned
      containerConcurrency: 10

      # Give model time to load on cold start before liveness kicks in
      timeoutSeconds: 300

      containers:
        - name: cifar10-faas
          image: cifar10-faas:latest       # replace with your registry path
          # e.g.: image: registry.example.com/faas/cifar10-faas:v1.0.0

          ports:
            - name: h2c                    # HTTP/2 cleartext — works for UE plain HTTP too
              containerPort: 8080

          env:
            - name: TOP_K
              value: "3"
            - name: MODEL_PATH
              value: "model/cifar10_model.h5"
            - name: NORM_PATH
              value: "model/cifar10_model_norm.npz"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 5

---
# Optional: expose the service externally via a fixed DNS name
# The Knative ingress gateway IP is what you configure in the UPF data network route
apiVersion: v1
kind: Service
metadata:
  name: cifar10-faas-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    serving.knative.dev/service: cifar10-faas
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30880     # fixed port — configure UPF route to <node-ip>:30880
